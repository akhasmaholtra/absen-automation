<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Personal & Lembur Otomatis</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        .btn-action { transition: all 0.2s; transform: scale(1); }
        .btn-action:active { transform: scale(0.95); }
        .clock-digit { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Header & Clock -->
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-1">Absensi Karyawan Mandiri</h1>
        <p class="text-slate-500 text-sm">Jam Kerja: 08:00 - 16:00 • Min. Lembur: 1 Jam</p>
        <div class="mt-6 text-5xl font-black text-slate-700 clock-digit tracking-tight" id="liveClock">00:00:00</div>
        <div class="text-slate-500 font-medium mt-1" id="liveDate">Senin, 1 Januari 2024</div>
    </div>

    <!-- Main Action Card -->
    <div class="w-full max-w-md glass rounded-3xl p-6 mb-8 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-slate-200" id="statusBar"></div>
        
        <!-- Status Display -->
        <div class="text-center mb-6">
            <span id="statusBadge" class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-slate-200 text-slate-600 mb-2">BELUM ABSEN</span>
            <h2 id="statusText" class="text-xl font-bold text-slate-800">Halo, siap bekerja hari ini?</h2>
        </div>

        <!-- Action Buttons -->
        <div id="actionContainer" class="grid gap-4">
            <button onclick="doCheckIn()" id="btnIn" class="btn-action w-full py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg shadow-lg shadow-blue-200">
                📍 Masuk Kerja (Check In)
            </button>
            <button onclick="doCheckOut()" id="btnOut" class="hidden btn-action w-full py-4 rounded-2xl bg-red-500 hover:bg-red-600 text-white font-bold text-lg shadow-lg shadow-red-200">
                🏠 Pulang (Check Out)
            </button>
        </div>

        <!-- Today's Log (Preview) -->
        <div id="todayLog" class="hidden mt-6 pt-6 border-t border-slate-100">
            <div class="grid grid-cols-2 gap-4 text-center">
                <div>
                    <div class="text-xs text-slate-400 uppercase font-bold">Masuk</div>
                    <div class="text-lg font-bold text-slate-700" id="logInTime">--:--</div>
                </div>
                <div>
                    <div class="text-xs text-slate-400 uppercase font-bold">Pulang</div>
                    <div class="text-lg font-bold text-slate-700" id="logOutTime">--:--</div>
                </div>
            </div>
            <div id="overtimeAlert" class="hidden mt-4 bg-amber-50 border border-amber-100 rounded-xl p-3 text-center">
                <span class="text-amber-800 text-sm font-bold">🔥 Lembur Terhitung: <span id="todayOvertimeVal">0 Jam</span></span>
            </div>
            <button onclick="resetToday()" class="mt-4 w-full text-xs text-slate-400 hover:text-red-500 underline">Reset Hari Ini (Jika salah klik)</button>
        </div>
    </div>

    <!-- Monthly Summary -->
    <div class="w-full max-w-md mb-6">
        <div class="glass rounded-2xl p-5 flex items-center justify-between">
            <div>
                <div class="text-xs text-slate-500 font-bold uppercase">Total Lembur Bulan Ini</div>
                <div class="text-2xl font-black text-blue-600" id="monthOvertimeTotal">0 Jam</div>
            </div>
            <div class="text-right">
                <div class="text-xs text-slate-500 font-bold uppercase">Hari Kerja</div>
                <div class="text-xl font-bold text-slate-700" id="monthWorkDays">0 Hari</div>
            </div>
        </div>
    </div>

    <!-- History Table -->
    <div class="w-full max-w-2xl glass rounded-3xl p-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-slate-700">Riwayat Absensi</h3>
            <button onclick="clearData()" class="text-xs text-red-400 hover:text-red-600">Hapus Data</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left">
                <thead class="text-xs text-slate-400 uppercase bg-slate-50">
                    <tr>
                        <th class="px-4 py-3 rounded-l-lg">Tanggal</th>
                        <th class="px-4 py-3 text-center">Masuk</th>
                        <th class="px-4 py-3 text-center">Pulang</th>
                        <th class="px-4 py-3 text-center">Lembur</th>
                        <th class="px-4 py-3 rounded-r-lg text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

<script>
    /* =================================================================
       KONFIGURASI & LOGIC
    ================================================================= */
    const STORAGE_KEY = 'absensi_personal_v1';
    const WORK_END_HOUR = 16; // Jam 16:00 (4 Sore)
    const MIN_OVERTIME_HOURS = 1; // Minimal 1 jam untuk dihitung lembur

    let attendanceData = [];

    // 1. Load Data
    function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        attendanceData = raw ? JSON.parse(raw) : [];
    }

    // 2. Save Data
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(attendanceData));
        renderUI();
    }

    // 3. Get Today's Record
    function getTodayRecord() {
        const todayStr = new Date().toLocaleDateString('id-ID');
        return attendanceData.find(r => r.dateString === todayStr);
    }

    // 4. Check In Logic
    function doCheckIn() {
        const now = new Date();
        const todayStr = now.toLocaleDateString('id-ID');
        
        // Cek apakah sudah ada data hari ini
        if (getTodayRecord()) return alert('Anda sudah absen masuk hari ini.');

        const record = {
            id: Date.now(),
            dateString: todayStr, // "Senin, 27 Oktober 2023"
            rawDate: now.toISOString(), // Untuk sorting
            checkIn: now.toISOString(),
            checkOut: null,
            overtimeMinutes: 0,
            isOvertime: false
        };

        attendanceData.unshift(record);
        saveData();
    }

    // 5. Check Out Logic (Inti Perhitungan Lembur)
    function doCheckOut() {
        const record = getTodayRecord();
        if (!record) return alert('Belum absen masuk!');

        const now = new Date();
        record.checkOut = now.toISOString();

        // --- LOGIKA LEMBUR ---
        // Buat objek tanggal untuk jam 16:00 hari ini
        const standardExit = new Date(now);
        standardExit.setHours(WORK_END_HOUR, 0, 0, 0);

        // Jika pulang lebih dari jam 16:00
        if (now > standardExit) {
            const diffMs = now - standardExit;
            const diffHours = diffMs / (1000 * 60 * 60); // Konversi ke jam desimal

            // Aturan: Harus >= 1 jam
            if (diffHours >= MIN_OVERTIME_HOURS) {
                record.isOvertime = true;
                // Simpan dalam menit untuk akurasi, atau bulatkan ke jam sesuai kebijakan
                // Di sini saya simpan menit real, nanti ditampilkan dalam jam
                record.overtimeMinutes = Math.floor(diffMs / (1000 * 60)); 
            } else {
                record.isOvertime = false;
                record.overtimeMinutes = 0; // Tidak dihitung lembur
            }
        } else {
            record.isOvertime = false;
            record.overtimeMinutes = 0;
        }

        saveData();
    }

    // 6. Reset Hari Ini (Jika salah pencet)
    function resetToday() {
        if(!confirm('Hapus data absensi hari ini?')) return;
        const todayStr = new Date().toLocaleDateString('id-ID');
        attendanceData = attendanceData.filter(r => r.dateString !== todayStr);
        saveData();
    }

    // 7. Hapus Semua Data
    function clearData() {
        if(confirm('Yakin ingin menghapus SEMUA riwayat?')) {
            attendanceData = [];
            saveData();
        }
    }

    // 8. Render UI
    function renderUI() {
        const record = getTodayRecord();
        const btnIn = document.getElementById('btnIn');
        const btnOut = document.getElementById('btnOut');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const statusBar = document.getElementById('statusBar');
        const todayLog = document.getElementById('todayLog');
        const overtimeAlert = document.getElementById('overtimeAlert');

        // Reset State
        btnIn.classList.add('hidden');
        btnOut.classList.add('hidden');
        todayLog.classList.add('hidden');
        overtimeAlert.classList.add('hidden');

        if (!record) {
            // Belum Absen
            btnIn.classList.remove('hidden');
            statusBadge.className = "inline-block px-3 py-1 rounded-full text-xs font-bold bg-slate-200 text-slate-600 mb-2";
            statusBadge.textContent = "BELUM ABSEN";
            statusText.textContent = "Halo, siap bekerja hari ini?";
            statusBar.className = "absolute top-0 left-0 w-full h-2 bg-slate-200";
        } else if (record.checkIn && !record.checkOut) {
            // Sudah Masuk, Belum Pulang
            btnOut.classList.remove('hidden');
            statusBadge.className = "inline-block px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-600 mb-2";
            statusBadge.textContent = "SEDANG BEKERJA";
            statusText.textContent = "Selamat bekerja! Jangan lupa absen pulang.";
            statusBar.className = "absolute top-0 left-0 w-full h-2 bg-blue-500 animate-pulse";
            
            // Show Log Preview
            todayLog.classList.remove('hidden');
            document.getElementById('logInTime').textContent = formatTime(record.checkIn);
            document.getElementById('logOutTime').textContent = "--:--";
        } else {
            // Sudah Selesai
            statusBadge.className = "inline-block px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-600 mb-2";
            statusBadge.textContent = "SELESAI";
            statusText.textContent = "Terima kasih untuk kerja kerasmu hari ini!";
            statusBar.className = "absolute top-0 left-0 w-full h-2 bg-green-500";

            // Show Log Preview
            todayLog.classList.remove('hidden');
            document.getElementById('logInTime').textContent = formatTime(record.checkIn);
            document.getElementById('logOutTime').textContent = formatTime(record.checkOut);

            if (record.isOvertime) {
                overtimeAlert.classList.remove('hidden');
                const hours = Math.floor(record.overtimeMinutes / 60);
                const mins = record.overtimeMinutes % 60;
                document.getElementById('todayOvertimeVal').textContent = `${hours} Jam ${mins > 0 ? mins + ' Menit' : ''}`;
            }
        }

        renderHistoryTable();
        renderMonthlyStats();
    }

    function renderHistoryTable() {
        const tbody = document.getElementById('historyBody');
        if (attendanceData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-slate-400">Belum ada riwayat absensi.</td></tr>`;
            return;
        }

        tbody.innerHTML = attendanceData.map(r => {
            const dateObj = new Date(r.rawDate);
            const day = dateObj.toLocaleDateString('id-ID', { weekday: 'long' });
            const date = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            
            let lemburText = '-';
            if (r.isOvertime) {
                const h = Math.floor(r.overtimeMinutes / 60);
                const m = r.overtimeMinutes % 60;
                lemburText = `<span class="font-bold text-amber-600">+${h}j ${m}m</span>`;
            }

            let statusPill = r.checkOut 
                ? `<span class="px-2 py-1 rounded bg-green-100 text-green-700 text-xs font-bold">Selesai</span>`
                : `<span class="px-2 py-1 rounded bg-blue-100 text-blue-700 text-xs font-bold">Aktif</span>`;

            return `
                <tr class="border-b border-slate-100 hover:bg-white transition">
                    <td class="px-4 py-3">
                        <div class="font-bold text-slate-700">${day}</div>
                        <div class="text-xs text-slate-500">${date}</div>
                    </td>
                    <td class="px-4 py-3 text-center font-mono text-slate-600">${formatTime(r.checkIn)}</td>
                    <td class="px-4 py-3 text-center font-mono text-slate-600">${r.checkOut ? formatTime(r.checkOut) : '--:--'}</td>
                    <td class="px-4 py-3 text-center text-xs">${lemburText}</td>
                    <td class="px-4 py-3 text-center">${statusPill}</td>
                </tr>
            `;
        }).join('');
    }

    function renderMonthlyStats() {
        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();

        // Filter data bulan ini
        const thisMonthData = attendanceData.filter(r => {
            const d = new Date(r.rawDate);
            return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
        });

        // Hitung total lembur (dalam menit)
        const totalMinutes = thisMonthData.reduce((sum, r) => sum + (r.overtimeMinutes || 0), 0);
        
        // Konversi ke Jam (tampilkan desimal 1 angka belakang koma agar rapi, misal 1.5 Jam)
        const totalHours = (totalMinutes / 60).toFixed(1);

        document.getElementById('monthOvertimeTotal').textContent = totalHours + " Jam";
        document.getElementById('monthWorkDays').textContent = thisMonthData.length + " Hari";
    }

    // Helper: Format Jam (HH:MM)
    function formatTime(isoString) {
        if (!isoString) return '--:--';
        const d = new Date(isoString);
        return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
    }

    // Helper: Live Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('liveClock').textContent = now.toLocaleTimeString('id-ID', { hour12: false });
        document.getElementById('liveDate').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    // Init
    loadData();
    renderUI();
    setInterval(updateClock, 1000);
    updateClock();

</script>
</body>
</html>
